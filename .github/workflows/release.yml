name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: top-launcher

      - name: Decode signing key to file
        shell: pwsh
        env:
          KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $decoded = [System.Text.Encoding]::UTF8.GetString(
            [System.Convert]::FromBase64String($env:KEY_BASE64)
          )
          $keyPath = "$env:RUNNER_TEMP\signing.key"
          [System.IO.File]::WriteAllText($keyPath, $decoded)
          Write-Host "Key written to: $keyPath"
          Write-Host "Contains untrusted: $($decoded.Contains('untrusted'))"
          echo "KEY_PATH=$keyPath" >> $env:GITHUB_ENV

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.KEY_PATH }}
        with:
          projectPath: top-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Top Launcher ${{ github.ref_name }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
          
      - name: Check if sig files exist
        shell: pwsh
        run: |
          $bundlePath = "top-launcher\src-tauri\target\release\bundle\nsis"
          Write-Host "Files in NSIS bundle dir:"
          Get-ChildItem $bundlePath | ForEach-Object { Write-Host $_.Name }
          
          $sigFile = Get-ChildItem $bundlePath -Filter "*.sig" -ErrorAction SilentlyContinue
          if ($sigFile) {
            Write-Host "SIG FILES FOUND:"
            $sigFile | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "NO SIG FILES FOUND - signing is not working"
          }
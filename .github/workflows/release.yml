name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: top-launcher

      - name: Debug signing
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $key = $env:TAURI_SIGNING_PRIVATE_KEY
          Write-Host "Key length: $($key.Length)"
          Write-Host "First 50 chars: $($key.Substring(0, [Math]::Min(50, $key.Length)))"
          Write-Host "Contains newline: $($key.Contains("`n"))"
          Write-Host "Contains 'untrusted': $($key.Contains('untrusted'))"

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: top-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Top Launcher ${{ github.ref_name }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false

      - name: Create and upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          
          $SIG_PATH = "top-launcher\src-tauri\target\release\bundle\nsis\AppPanell_${VERSION}_x64-setup.exe.sig"
          $ZIP_PATH = "top-launcher\src-tauri\target\release\bundle\nsis\AppPanell_${VERSION}_x64-setup.nsis.zip"
          
          Write-Host "Looking for sig at: $SIG_PATH"
          
          if (-not (Test-Path $SIG_PATH)) {
            Write-Error "Signature file not found: $SIG_PATH"
            exit 1
          }
          
          $NSIS_SIG = Get-Content $SIG_PATH -Raw
          $DATE = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          
          $JSON = @{
            version = $VERSION
            notes = "See changelog for details"
            pub_date = $DATE
            platforms = @{
              "windows-x86_64" = @{
                url = "https://github.com/Atoryx1s/AppPanell/releases/download/v${VERSION}/AppPanell_${VERSION}_x64-setup.nsis.zip"
                signature = $NSIS_SIG.Trim()
              }
            }
          } | ConvertTo-Json -Depth 5
          
          $JSON | Out-File -FilePath "latest.json" -Encoding utf8
          
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"
          
          gh release upload "v${VERSION}" "latest.json" --clobber
          gh release upload "v${VERSION}" "$ZIP_PATH" --clobber
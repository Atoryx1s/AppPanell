name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: top-launcher

      - name: Check Signer Key
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Key is empty! Please check GitHub secrets."
          else
            echo "Key found, length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          fi
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ""
        with:
          projectPath: top-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Top Launcher ${{ github.ref_name }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: false
          includeUpdaterJson: true
          args: --verbose
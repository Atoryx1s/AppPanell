name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: top-launcher

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: top-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Top Launcher ${{ github.ref_name }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false

      - name: Sign and upload updater files
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $BUNDLE = "top-launcher\src-tauri\target\release\bundle\nsis"
          $EXE = "$BUNDLE\AppPanell_${VERSION}_x64-setup.exe"
          $ZIP = "$BUNDLE\AppPanell_${VERSION}_x64-setup.nsis.zip"

          $KEY = $env:KEY_BASE64
          Write-Host "Key length: $($KEY.Length)"

          Compress-Archive -Path $EXE -DestinationPath $ZIP -Force

          npx tauri signer sign -k $KEY -p "" $EXE
          npx tauri signer sign -k $KEY -p "" $ZIP

          $SIG = Get-Content "$ZIP.sig" -Raw

          $DATE = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $JSON = @{
            version = $VERSION
            notes = "See changelog for details"
            pub_date = $DATE
            platforms = @{
              "windows-x86_64" = @{
                url = "https://github.com/Atoryx1s/AppPanell/releases/download/v${VERSION}/AppPanell_${VERSION}_x64-setup.nsis.zip"
                signature = $SIG.Trim()
              }
            }
          } | ConvertTo-Json -Depth 5

          $JSON | Out-File -FilePath "latest.json" -Encoding utf8

          gh release upload "v${VERSION}" "latest.json" --clobber
          gh release upload "v${VERSION}" $ZIP --clobber
          gh release upload "v${VERSION}" "$ZIP.sig" --clobber
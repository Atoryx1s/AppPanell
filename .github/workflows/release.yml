name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: top-launcher

      - name: Decode signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $decoded = [System.Text.Encoding]::UTF8.GetString(
            [System.Convert]::FromBase64String($env:TAURI_SIGNING_PRIVATE_KEY)
          )
          $decoded | Out-File -FilePath "signing.key" -Encoding utf8 -NoNewline
          Write-Host "Decoded key length: $($decoded.Length)"
          Write-Host "Contains untrusted: $($decoded.Contains('untrusted'))"

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: top-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Top Launcher ${{ github.ref_name }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false